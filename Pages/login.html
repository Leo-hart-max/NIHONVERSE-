<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         BASIC META
    ========================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login • SakuraVerse</title>

    <meta name="description"
          content="Login to SakuraVerse and continue your Japanese learning journey.">

    <!-- =========================
         GOOGLE FONT
    ========================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- =========================
         CSS FILES
    ========================== -->

    <link rel="stylesheet"
          href="../assets/css/variables.css">

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

    <link rel="stylesheet"
          href="../assets/css/animations.css">

</head>

<body>

<!-- =========================
     LOGIN SECTION
========================= -->

<section class="login-page">

    <div class="container">

        <div class="login-wrapper">

            <!-- Left Side -->

            <div class="login-info">

                <a href="../index.html"
                   class="logo">

                    🌸 SakuraVerse

                </a>

                <span class="section-badge">

                    Welcome Back

                </span>

                <h1>

                    Continue Your
                    Japanese Journey

                </h1>

                <p>

                    Log in to access your dashboard,
                    AI Tutor, quizzes, streaks,
                    achievements and learning progress.

                </p>

            </div>

            <!-- Right Side -->

            <div class="login-card">

                <h2>

                    Login

                </h2>

                <p>

                    Enter your account details.

                </p>

                              <!-- =========================
                     LOGIN FORM
                ========================== -->

                <form class="login-form">

                    <div class="form-group">

                        <label for="email">

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="password">

                            Password

                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Login

                    </button>

                </form>

                              <!-- =========================
                     FORM OPTIONS
                ========================== -->

                <div class="login-options">

                    <label class="remember-me">

                        <input
                            type="checkbox"
                            name="remember">

                        <span>

                            Remember Me

                        </span>

                    </label>

                    <a href="#"
                       class="forgot-password">

                        Forgot Password?

                    </a>

                </div>

                <div class="login-divider">

                    <span>

                        OR

                    </span>

                </div>

                <button
                    type="button"
                    class="btn btn-outline google-login">

                    Continue with Google

                </button>

                              <!-- =========================
                     SIGN UP LINK
                ========================== -->

                <p class="signup-text">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </p>

            </div>

        </div>

    </div>

</section>

  <!-- =========================
     JAVASCRIPT
========================= -->

<script
    src="../assets/js/script.js">

</script>

</body>

</html>
