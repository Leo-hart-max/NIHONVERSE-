<!DOCTYPE html>
<html lang="en">

<head>

    <!-- =========================
         BASIC META
    ========================== -->

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account • SakuraVerse</title>

    <meta name="description"
          content="Create your SakuraVerse account and start learning Japanese with AI.">

    <!-- =========================
         GOOGLE FONT
    ========================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- =========================
         CSS FILES
    ========================== -->

    <link rel="stylesheet"
          href="../assets/css/variables.css">

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="../assets/css/responsive.css">

    <link rel="stylesheet"
          href="../assets/css/animations.css">

</head>

<body>

<!-- =========================
     SIGNUP SECTION
========================= -->

<section class="signup-page">

    <div class="container">

        <div class="login-wrapper">

            <!-- Left Side -->

            <div class="login-info">

                <a href="../index.html"
                   class="logo">

                    🌸 SakuraVerse

                </a>

                <span class="section-badge">

                    Join SakuraVerse

                </span>

                <h1>

                    Start Your
                    Japanese Journey

                </h1>

                <p>

                    Create your account and unlock
                    AI Tutor, interactive lessons,
                    quizzes, streaks and achievements.

                </p>

            </div>

            <!-- Right Side -->

            <div class="login-card">

                <h2>

                    Create Account

                </h2>

                <p>

                    Fill in your details to begin.

                </p>

                              <!-- =========================
                     SIGNUP FORM
                ========================== -->

                <form class="signup-form">

                    <div class="form-group">

                        <label for="fullname">

                            Full Name

                        </label>

                        <input
                            type="text"
                            id="fullname"
                            name="fullname"
                            placeholder="Enter your full name"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="email">

                            Email Address

                        </label>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="password">

                            Password

                        </label>

                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Create a password"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="confirm-password">

                            Confirm Password

                        </label>

                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            placeholder="Confirm your password"
                            required>

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Create Account

                    </button>

                </form>

                              <!-- =========================
                     TERMS & CONDITIONS
                ========================== -->

                <div class="login-options">

                    <label class="remember-me">

                        <input
                            type="checkbox"
                            name="terms"
                            required>

                        <span>

                            I agree to the
                            <a href="#">Terms of Service</a>
                            &
                            <a href="#">Privacy Policy</a>

                        </span>

                    </label>

                </div>

                <div class="login-divider">

                    <span>

                        OR

                    </span>

                </div>

                <button
                    type="button"
                    class="btn btn-outline google-login">

                    Continue with Google

                </button>

                              <!-- =========================
                     LOGIN LINK
                ========================== -->

                <p class="signup-text">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

</section>

  <!-- =========================
     JAVASCRIPT
========================= -->

<script
    src="../assets/js/script.js">

</script>

</body>

</html>
